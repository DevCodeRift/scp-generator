  <!-- Outer gear teeth -->
  <path d="M50 12 L53 20 L47 20 Z" fill="currentColor"/>
  <path d="M77 23 L72 30 L68 26 Z" fill="currentColor"/>
  <path d="M88 50 L80 53 L80 47 Z" fill="currentColor"/>
  <path d="M77 77 L72 70 L68 74 Z" fill="currentColor"/>
  <path d="M50 88 L47 80 L53 80 Z" fill="currentColor"/>
  <path d="M23 77 L28 70 L32 74 Z" fill="currentColor"/>
  <path d="M12 50 L20 47 L20 53 Z" fill="currentColor"/>
  <path d="M23 23 L28 30 L32 26 Z" fill="currentColor"/>

  <!-- Inner gear circle -->
